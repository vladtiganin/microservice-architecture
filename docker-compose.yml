version: '3.9'

services:
  postgres_test:
    image: postgres:16
    container_name: postgres_test_jobs
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobs_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobs_test"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s